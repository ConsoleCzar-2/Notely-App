
services:
  # ─── Infrastructure ───────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: notes_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - notes_network

  postgres:
    image: postgres:16-alpine
    container_name: notes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - notes_network

  redis:
    image: redis:7-alpine
    container_name: notes_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - notes_network

  # ─── Microservices ─────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: auth_service
    restart: unless-stopped
    environment:
      PORT: 4001
      JWT_SECRET: supersecret_jwt_key_change_in_prod
      JWT_EXPIRES_IN: 7d
      REDIS_URL: redis://redis:6379
    ports:
      - "4001:4001"
    depends_on:
      - redis
    networks:
      - notes_network

  user-service:
    build: ./user-service
    container_name: user_service
    restart: unless-stopped
    environment:
      PORT: 4002
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/userdb
      JWT_SECRET: supersecret_jwt_key_change_in_prod
    ports:
      - "4002:4002"
    depends_on:
      - postgres
    networks:
      - notes_network

  notes-service:
    build: ./notes-service
    container_name: notes_service
    restart: unless-stopped
    environment:
      PORT: 4003
      MONGO_URI: mongodb://mongo:27017/notesdb
      JWT_SECRET: supersecret_jwt_key_change_in_prod
    ports:
      - "4003:4003"
    depends_on:
      - mongo
    networks:
      - notes_network

  api-gateway:
    build: ./api-gateway
    container_name: api_gateway
    restart: unless-stopped
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
      NOTES_SERVICE_URL: http://notes-service:4003
      JWT_SECRET: supersecret_jwt_key_change_in_prod
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - user-service
      - notes-service
    networks:
      - notes_network

  frontend:
    build: ./frontend
    container_name: notely_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    networks:
      - notes_network

volumes:
  mongo_data:
  postgres_data:

networks:
  notes_network:
    driver: bridge
